# --- Google Calendar 設定 ---
google_calendar:
  credentials_file: "config/google_credentials.json"  # OAuthクレデンシャルJSON
  calendar_ids:
    - "primary"                             # メインカレンダー（追加カレンダーはIDを追加）

# --- Claude API 設定（要約機能） ---
# 組織管理者から権限が付与されている場合のみ使用
# 未設定の場合はルールベースの要約にフォールバック
claude:
  api_key: ""                               # AnthropicダッシュボードからAPIキーを取得
  enabled: false                            # trueにするとAI要約を使用
  model: "claude-sonnet-4-6"

# --- レポート設定 ---
report:
  # 対象期間（月曜〜金曜の1週間）
  lookback_days: 7
  # 出力先ディレクトリ
  output_dir: "output"
  # Backlogへの自動転記（falseにするとローカル出力のみ）
  auto_post_to_backlog: true
  # ドライラン（trueにするとBacklogへの書き込みをスキップ）
  dry_run: false

# --- スケジューラー設定 ---
schedule:
  # 毎週金曜 18:00 に実行
  day_of_week: "friday"
  hour: 18
  minute: 0

# --- ナレッジベース設定 ---
knowledge_base:
  enabled: true
  output_dir: "output/knowledge"     # チケット別・Slack別Markdownの出力先

# --- 未対応チケット警告設定 ---
ticket_alert:
  enabled: true
  stale_business_days: 3             # 何営業日更新がなければ警告するか
  run_hour: 9
  run_minute: 0

# --- 日次夕方サマリー設定 ---
daily_summary:
  enabled: true
  run_hour: 17
  run_minute: 30

# --- Google Meet 議事録設定 ---
google_meet:
  enabled: true
  # マイドライブ > Meet Recordings フォルダの Google Drive フォルダID
  folder_id: "1dqz9mGm2eCrThWJBzuiee3TPBw1nOMXj"

# --- Gemini API 設定（議事録要約機能） ---
# Google AI Studio（https://aistudio.google.com）からAPIキーを取得して設定
gemini:
  api_key: "${GEMINI_API_KEY}"   # .env の GEMINI_API_KEY に設定
  enabled: true                 # APIキー取得後に true に変更
  model: "gemini-2.5-flash"

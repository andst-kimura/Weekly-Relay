# --- Slack Bot 設定（KB 質問応答 Bot）---
slack_bot:
  enabled: true
  # Socket Mode 用トークン（xapp-...）
  # Slack App 設定 > Socket Mode で有効化し、App-Level Token を発行
  app_token: "${SLACK_APP_TOKEN}"
  # 1回の質問で参照する KB ドキュメント数（多いほど精度↑、速度↓）
  n_results: 5
  # 共有事項コマンド設定
  shared_info:
    # 起票先プロジェクトキー（省略時は backlog.report_project_key を使用）
    project_key: "SALES_TEAM"
    # 種別ID（共有事項）: python main.py --check-issue-types で確認
    issue_type_id: 915353
  # Bot を招待済みのチャンネル一覧（管理用メモ。コードからは参照しない）
  # チャンネルへの招待: /invite @Wasabi Bot
  # チャンネルから退出: /kick @Wasabi Bot または Slack チャンネル設定から削除
  joined_channels:
    - 販売チームV2
    - 販売チーム_hblab
    - prj_mobilepos
    - 販売チーム_all
    - 販売チーム_ncr
    - 販売チーム_ビジサク
    - 販売チーム_pdc
    - 販売チーム_sts
    - 販売コーポレートチーム
    - 販売チーム_フィジオ
    - 販売チーム_インフラ
    - 販売_データ
    - 販売_ガバナンス
    - pjt_顧客カルテ02
    - シン-オープン化-
    - バリューチェーンdx推進_all
    - 販売チーム_物流

# --- Google Calendar 設定 ---
google_calendar:
  credentials_file: "config/google_credentials.json"  # OAuthクレデンシャルJSON
  calendar_ids:
    - "primary"                             # メインカレンダー（追加カレンダーはIDを追加）

# --- Firestore 設定 ---
# 個人用 GCP プロジェクト（weekly-relay）の Firestore を使用
firestore:
  enabled: true
  # 環境変数で上書き可能（GOOGLE_CLOUD_PROJECT / FIRESTORE_DATABASE）
  project: "weekly-relay"
  database: "weekly-relay"

# --- レポート設定 ---
report:
  # 対象期間（月曜〜金曜の1週間）
  lookback_days: 7
  # 出力先ディレクトリ
  output_dir: "output"
  # Backlogへの自動転記（falseにするとローカル出力のみ）
  auto_post_to_backlog: true
  # ドライラン（trueにするとBacklogへの書き込みをスキップ）
  dry_run: false

# --- スケジューラー設定 ---
schedule:
  # 毎週金曜 18:00 に実行
  day_of_week: "friday"
  hour: 18
  minute: 0

# --- ナレッジベース設定 ---
knowledge_base:
  enabled: true
  # output_dir は Firestore 有効時は未使用（後方互換のため残す）
  output_dir: "output/knowledge"

# --- 未対応チケット警告設定 ---
ticket_alert:
  enabled: true
  stale_business_days: 3             # 何営業日更新がなければ警告するか
  run_hour: 9
  run_minute: 0

# --- 日次夕方サマリー設定 ---
daily_summary:
  enabled: true
  run_hour: 17
  run_minute: 30

# --- Google Meet 議事録設定 ---
google_meet:
  enabled: true
  # マイドライブ > Meet Recordings フォルダの Google Drive フォルダID
  folder_id: "1dqz9mGm2eCrThWJBzuiee3TPBw1nOMXj"

# --- Gemini API 設定（議事録要約機能） ---
# Google AI Studio（https://aistudio.google.com）からAPIキーを取得して設定
gemini:
  api_key: "${GEMINI_API_KEY}"   # .env の GEMINI_API_KEY に設定
  enabled: true                 # APIキー取得後に true に変更
  model: "gemini-2.5-flash"
